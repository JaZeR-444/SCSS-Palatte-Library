<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" fill="none" role="img" aria-label="Palattes logo (dark background)">
  <!-- ── Icon mark (72 × 72 rounded square) ── -->
  <rect x="0" y="0" width="72" height="72" rx="16" fill="#1E293B"/>

  <!-- 6-dot palette grid -->
  <circle cx="21.5" cy="19" r="8.5" fill="#818CF8"/>
  <circle cx="50.5" cy="19" r="8.5" fill="#34D399"/>
  <circle cx="21.5" cy="36" r="8.5" fill="#FB923C"/>
  <circle cx="50.5" cy="36" r="8.5" fill="#F472B6"/>
  <circle cx="21.5" cy="53" r="8.5" fill="#A78BFA"/>
  <circle cx="50.5" cy="53" r="8.5" fill="#22D3EE"/>

  <!-- ── Wordmark ── -->
  <text
    x="88"
    y="50"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="42"
    letter-spacing="-1.2"
    fill="#F8FAFC"
  >Palattes</text>

  <!-- Tagline -->
  <text
    x="89"
    y="66"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif"
    font-weight="500"
    font-size="11"
    letter-spacing="2"
    fill="#94A3B8"
  >COLOR PALETTE LIBRARY</text>
</svg>
