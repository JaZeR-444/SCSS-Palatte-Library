<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Palattes app icon">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="#0F172A"/>

  <!-- 6-swatch palette grid: 2 cols × 3 rows -->
  <!-- Indigo  | Emerald -->
  <circle cx="160" cy="142" r="60" fill="#6366F1"/>
  <circle cx="352" cy="142" r="60" fill="#10B981"/>

  <!-- Orange  | Pink -->
  <circle cx="160" cy="256" r="60" fill="#F97316"/>
  <circle cx="352" cy="256" r="60" fill="#EC4899"/>

  <!-- Violet  | Cyan -->
  <circle cx="160" cy="370" r="60" fill="#8B5CF6"/>
  <circle cx="352" cy="370" r="60" fill="#06B6D4"/>
</svg>
